[gcode_macro LINE_PURGE]
description: Purge-Linie wie das Original (Hin & Her), 5cm lang, dynamisch hinter dem Bauteil
gcode:
    # Get relevant printer params
    {% set travel_speed = (printer.toolhead.max_velocity) * 60 | float %}
    {% set cross_section = printer.configfile.settings.extruder.max_extrude_cross_section | float %}
    
    # --- ÄNDERUNG 1: Rückzug auf 2mm erhöht ---
    {% if printer.firmware_retraction is defined %}
        {% set RETRACT = "G10" | string %}
    {% else %}
        {% set RETRACT = 'G1 E-.7 F2100' | string %} # Hier von -0.5 auf -2 geändert
    {% endif %}

    # Eigene Einstellungen
    {% set verbose_enable = True %}    
    {% set purge_height = 0.3 %}       
    {% set tip_distance = 0 %}        
    {% set purge_margin = params.BRIM_WIDTH|default(10)|float + 10 %}  #20 %}        
    {% set purge_len = 50 %}           

    # Calculate object boundaries
    {% set all_points = printer.exclude_object.objects | map(attribute='polygon') | sum(start=[]) %}    
    {% set purge_x_min = (all_points | map(attribute=0) | min | default(0)) %}                         
    {% set purge_x_max = (all_points | map(attribute=0) | max | default(0)) %}                         
    {% set purge_y_min = (all_points | map(attribute=1) | min | default(0)) %}                         
    {% set purge_y_max = (all_points | map(attribute=1) | max | default(0)) %}                         

    # Startpunkt-Berechnung
    {% set purge_x_start = ([((purge_x_max + purge_x_min) / 2) - (purge_len / 2), 0] | max) %}      
    {% set purge_y_origin = purge_y_max + purge_margin %}                                     

    {% if cross_section < 5 %}
        {action_respond_info("max_extrude_cross_section zu niedrig! Bitte auf 5 setzen.")}
    {% else %}

        SAVE_GCODE_STATE NAME=Prepurge_State                                                    
        G90                                                                                 
        M83                                                                                 

        # --- LOGIK: HINTER DEM OBJEKT ---
        {% if purge_y_origin < printer.toolhead.axis_maximum.y %}                                                                             
            G0 X{purge_x_start} Y{purge_y_origin} F{travel_speed}               
            G0 Z{purge_height} F1500
            G92 E0
            G1 E{tip_distance} F1200                                            
            G1 X{purge_x_start + purge_len} E8 F1200                            # HINFAHRT
            G1 Y{purge_y_origin + 0.4} F1500                                    # Versatz
            G1 X{purge_x_start} E16 F1200                                       # RÜCKFAHRT
            G92 E0                                                          
            G1 Z2.0 F3000 ; Move Z Axis up little to prevent scratching of Heat Bed
            
            # --- ÄNDERUNG 2: Rückzug und Heben kombiniert ---
            #{RETRACT}                                                           # 2mm Retract
            #G0 Z2 F3000                                                         # Auf 2mm Sicherheitshöhe springen
            #G0 X{purge_x_start - 10} F{travel_speed}                            # Wipe weg

        # --- LOGIK: LINKS VOM OBJEKT ---
        {% else %}                                                                                
            {% set purge_x_side = ([purge_x_min - purge_margin, 0] | max) %}
            {% set purge_y_side = ([((purge_y_max + purge_y_min) / 2) - (purge_len / 2), 0] | max) %}
            G0 X{purge_x_side} Y{purge_y_side} F{travel_speed}
            G0 Z{purge_height} F1500
            G92 E0
            G1 E{tip_distance} F1200
            G1 Y{purge_y_side + purge_len} E8 F1200                             # HINFAHRT
            G1 X{purge_x_side + 0.4} F1500                                      # Versatz
            G1 Y{purge_y_side} E12 F1200                                         # RÜCKFAHRT
            G92 E0
            G1 Z2.0 F3000
            
            # --- ÄNDERUNG 2 (für Seite): ---
            {RETRACT}                                                           # 2mm Retract
            G0 Z2 F3000                                                         # Auf 2mm Sicherheitshöhe
            G0 Y{purge_y_side - 10} F{travel_speed}                             # Wipe weg
        {% endif %}

        G92 E0                                                                              
        M82                                                                                 
        RESTORE_GCODE_STATE NAME=Prepurge_State
    {% endif %}
