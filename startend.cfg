[gcode_macro PRINT_START]
gcode:
    SET_GCODE_VARIABLE MACRO=M600 VARIABLE=wechsel VALUE=0
    {% set bed_temp = params.BED|default(65)|float %}
    {% set extruder_temp = params.EXTRUDER|default(220)|float %}
    {% set brim_width = params.BRIM_WIDTH|default(0)|float %}
    M140 S{bed_temp}
    G90
    CONDITIONAL_HOMING
    G28 Z
    BED_MESH_CALIBRATE ADAPTIVE=1
    G1 Z5 F3000
    M190 S{bed_temp}
    M109 S{extruder_temp}
    LINE_PURGE BRIM_WIDTH={brim_width}
    G92 E0
    G1 Z2.0 F3000

[gcode_macro PRINT_END]
variable_machine_depth: 225
gcode:
    M140 S0
    M104 S0
    M106 S0
    G91
    G1 Z0.2 E-5 F2400
    G1 Z10
    G90
    G1 X0 Y220
    M84
