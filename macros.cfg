[pause_resume]

[gcode_macro PAUSE]
description: Pause the actual running print
rename_existing: PAUSE_BASE
gcode:
  PAUSE_BASE
  G91
  G1 E-2.0 F2100        ; Filament zurückziehen
  G1 Z10                ; Z kurz anheben
  G90
  G1 X10 Y200 F6000     ; Parkposition (an Ender 3 Bett angepasst)

[gcode_macro RESUME]
description: Resume the actual running print
rename_existing: RESUME_BASE
gcode:
  G91
  G1 E2.0 F2100         ; Filament wieder vorschieben
  G90
  RESUME_BASE

[screws_tilt_adjust]
screw1: 57, 73          # Position des SENSORS über Schraube 1
screw1_name: vorn links (Basis)
screw2: 227, 73         # Position des SENSORS über Schraube 2
screw2_name: vorn rechts
screw3: 227, 220        # Position des SENSORS über Schraube 3
screw3_name: hinten rechts
screw4: 57, 220         # Position des SENSORS über Schraube 4
screw4_name: hinten links
horizontal_move_z: 10
speed: 200
screw_thread: CW-M4     # Creality nutzt M4 Schrauben, Drehung im Uhrzeigersinn

[gcode_macro BETTSCHRAUBEN_CHECK]
description: Startet den Screws Tilt Test
gcode:
    CONDITIONAL_HOMING                        
    SCREWS_TILT_CALCULATE           # Dann Messen

[gcode_macro PETG_SMART_PULL]
description: Automatisierter Cold Pull speziell fuer PETG (CHT Düse)
gcode:
    {% set hotend_temp = 240 %}
    {% set pull_temp = 125 %}       # 135°C ist der Sweetspot für PETG auf CHT
    
    M117 Vorheizen auf 240C...
    M109 S{hotend_temp}             # Aufheizen und warten
    G91                             # Relative Positionierung
    G1 E5 F300                      # 5mm vorschieben um Düse zu füllen
    
    M117 Abkuehlen auf 125C...
    M104 S{pull_temp}               # Zieltemperatur senken
    
    # Warten bis die Temperatur fällt
    TEMPERATURE_WAIT SENSOR=extruder MAXIMUM={pull_temp + 1}
    
    M117 PULL!
    # Die magische Zeile, die die Sperre für diesen Moment ignoriert:
    SET_EXTRUDER_STEPPER_ENABLE STEPPER=extruder ENABLE=1
    
    #G1 E1 F100                      # Erst langsam lösen
    G1 E-60 F2000                   # Dann mit High-Speed rauswerfen
    
    M104 S0                         # Heizung aus
    M117 Pull fertig! Filament entnehmen.
    G90                             # Zurück zu Absolut

[gcode_macro AUTO_INPUT_SHAPER]
description: Startet die automatische Kalibrierung für X und Y nacheinander
gcode:
  # Prüfen, ob der Drucker gehomed ist
  {% if printer.toolhead.homed_axes != "xyz" %}
    M117 Homig läuft...
    CONDITIONAL_HOMING
  {% endif %}
  
  M117 Starte Resonanztest...
  SHAPER_CALIBRATE
  
  M117 Kalibrierung beendet! Speichere Werte...

[gcode_macro PID_HOTEND]
description: Startet PID Tuning fürs Hotend bei 220 Grad
gcode:
    PID_CALIBRATE HEATER=extruder TARGET=260

[gcode_macro PID_BETT]
description: Startet PID Tuning fürs Druckbett bei 60 Grad
gcode:
    M117 PID Tuning Bett bei 60C...
    PID_CALIBRATE HEATER=heater_bed TARGET=60
    
[gcode_macro M600]
description: Erzwingt Stopp vor dem Turm mit Farbansage (Sicher gegen Start-Pause)
variable_wechsel: 0
gcode:
    # 1. Wir zählen jeden Aufruf von M600 intern mit
    {% set aktueller_wechsel = printer["gcode_macro M600"].wechsel | int %}
    SET_GCODE_VARIABLE MACRO=M600 VARIABLE=wechsel VALUE={aktueller_wechsel + 1}

    # 2. Wenn es der ALLERERSTE Aufruf ist (beim Druckstart nach der Purge Line), ignorieren wir ihn!
    {% if aktueller_wechsel == 0 %}
        {action_respond_info("M600 beim allerersten Druckstart erfolgreich uebersprungen.")}
    {% else %}
        # AB HIER: Jeder weitere Aufruf ist ein echter Farbwechsel mitten im Druck!
        
        # Pop-up in Mainsail anzeigen
        M117 Filament wechseln und PLAY druecken!
        {action_respond_info("======= FARBWECHSEL AKTIV =======")}
        
        # 1. Sofortiger Stopp des Slicer-G-Codes
        PAUSE_BASE
        
        # 2. Den Kopf manuell in Sicherheit bringen
        G91                  ; Relativ
        G1 Z30 F600          ; 30mm hoch
        G90                  ; Absolut
        G1 X10 Y0 F6000      ; Parkposition
        
        # 3. Filament auswerfen
        M83                  ; Relativer Extruder
        G1 E-2 F300          ; Kurzer Retract
        G1 E-55 F2100        ; Filament weit raus aus dem Sprite Pro
    {% endif %}

[gcode_macro FILAMENT_LADEN]
description: Zieht neues Filament automatisch bis zur Duese
gcode:
    SAVE_GCODE_STATE NAME=load_state
    G91
    M117 Filament wird geladen...
    G1 E40 F300           # Schneller Einzug bis zum Hotend
    G1 E10 F150           # Langsames Primen der Duese
    M400                  # ZWINGT den Drucker, erst die Extrusion komplett zu beenden
    G4 P2000              # Wartet genau 2 Sekunden, damit der Druck aus der Duese weicht
    G1 E-3 F2100          # 3 mm Rueckzug mit 35 mm/s (F2100), um Nachsifften zu verhindern
    G90
    M117 Laden fertig!
    RESTORE_GCODE_STATE NAME=load_state

[gcode_macro FILAMENT_AUSWERFEN]
description: Wirft das Filament automatisch aus dem Extruder aus
gcode:
    SAVE_GCODE_STATE NAME=unload_state
    G91
    M117 Filament wird ausgeworfen...
    #G1 E2 F300            # Optional: 2mm vorschieben, um die Spitze zu schmelzen/loesen
    G1 E-50 F2100         # Schneller Rueckzug aus dem Hotend/Extruder (50mm mit 35mm/s)
    M400                  # Wartet, bis die Bewegung komplett abgeschlossen ist
    G90
    M117 Filament ausgeworfen!
    RESTORE_GCODE_STATE NAME=unload_state

[gcode_macro CONDITIONAL_HOMING]
gcode:
    {% if "xyz" not in printer.toolhead.homed_axes %}
        G28
    {% endif %}

[gcode_macro SET_ACTIVE_SPOOL]
gcode:
  {% if params.ID %}
    {% set id = params.ID|int %}
    {action_call_remote_method(
       "spoolman_set_active_spool",
       spool_id=id
    )}
  {% else %}
    {action_call_remote_method(
       "spoolman_set_active_spool",
       spool_id=None
    )}
  {% endif %}

[gcode_macro DUESE_WECHSELN]
description: Fährt den Sprite Pro in Wartungsposition und heizt auf 240C
gcode:
    CONDITIONAL_HOMING    ; Nutzt dein vorhandenes Homing-Makro
    G90                   ; Absolute Positionierung
    M117 Fahre in Position...
    G1 Z150 F600          ; Kopf 150mm hochfahren für massig Platz von unten
    G1 X115 Y20 F6000     ; Mittig ganz nach vorne fahren
    M117 Heize auf 240C...
    M109 S240             ; Auf Schmelztemperatur heizen und warten
    M117 Bereit zum Wechsel! Vorsicht heiss!
